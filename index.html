<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vladivostok FM (Yandex Fast)</title>
    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #fc0 0%, #f00 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .player { background: white; border-radius: 16px; padding: 24px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin: 0 0 20px; }
        .btn { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 8px; background: #fc0; color: #000; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn:hover { opacity: 0.9; }
        audio { width: 100%; margin: 15px 0; }
        .status { text-align: center; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .status.loading { background: #fff3e0; color: #ef6c00; }
        .status.playing { background: #e3f2fd; color: #1976d2; }
        .track-list { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .track { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; }
        .track:hover { background: #f8f9ff; }
        .track.active { background: #e3f2fd; border-left: 4px solid #fc0; font-weight: 500; }
        .track-num { color: #888; min-width: 24px; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="player">
        <h2>🎧 Vladivostok FM (Yandex)</h2>
        
        <button class="btn" onclick="loadTracks()">🔄 Обновить список</button>
        <div id="status" class="status">Нажмите "Обновить"</div>
        
        <audio id="audio" controls preload="auto"></audio>
        
        <ul class="track-list" id="trackList"></ul>
    </div>

    <script>
        // ==========================================
        // 🔧 НАСТРОЙКИ
        // ==========================================
        
        // 1. Зайдите на https://disk.yandex.ru/
        // 2. Откройте папку с музыкой
        // 3. Скопируйте ссылку на папку (например: https://disk.yandex.ru/d/AbCdEfGhIjKlMn)
        // 4. Вставьте сюда ТОЛЬКО часть после /d/ (например: AbCdEfGhIjKlMn)
        const FOLDER_PUBLIC_KEY = 'HZXzS2Z6NzkhIw'; 

        // ==========================================
        // 🎵 ЛОГИКА
        // ==========================================
        
        let tracks = [];
        let currentIndex = -1;
        const audio = document.getElementById('audio');
        const statusEl = document.getElementById('status');
        const trackListEl = document.getElementById('trackList');

        async function loadTracks() {
            statusEl.textContent = '📥 Загрузка списка...';
            statusEl.className = 'status loading';
            
            try {
                // Запрашиваем информацию о папке через публичный API Яндекса
                const response = await fetch(`https://cloud-api.yandex.net/v1/disk/public/resources?public_key=https://disk.yandex.ru/d/${FOLDER_PUBLIC_KEY}&limit=100`);
                const data = await response.json();
                
                if (!data._embedded || !data._embedded.items) {
                    throw new Error('Папка не найдена или пуста. Проверьте FOLDER_PUBLIC_KEY');
                }
                
                // Фильтруем только MP3
                tracks = data._embedded.items
                    .filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.mp3'))
                    .map((item, index) => ({
                        id: index,
                        title: item.name,
                        size: item.size,
                        // 🔥 ПРЯМАЯ ССЫЛКА НА СКАЧИВАНИЕ (Яндекс дает её бесплатно!)
                        downloadUrl: item.file
                    }));
                
                // Сортировка
                tracks.sort((a, b) => a.title.localeCompare(b.title));
                
                statusEl.textContent = `✅ Найдено треков: ${tracks.length}`;
                statusEl.className = 'status';
                
                renderTracks();
                
            } catch (err) {
                console.error(err);
                statusEl.textContent = '❌ Ошибка: ' + err.message;
                statusEl.className = 'status';
            }
        }

        function renderTracks() {
            trackListEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = 'track';
                li.innerHTML = `<span class="track-num">${index + 1}.</span><span>${track.title}</span>`;
                li.onclick = () => playTrack(index);
                trackListEl.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            
            currentIndex = index;
            const track = tracks[index];
            
            // Подсветка
            document.querySelectorAll('.track').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            
            statusEl.textContent = `🎵 Играет: ${track.title}`;
            statusEl.className = 'status playing';
            
            // 🔥 МГНОВЕННОЕ ВОСПРОИЗВЕДЕНИЕ
            // Просто ставим прямую ссылку, которую дал Яндекс
            audio.src = track.downloadUrl;
            audio.play().catch(e => {
                console.error(e);
                statusEl.textContent = '⚠️ Ошибка воспроизведения';
            });
        }

        audio.onended = () => {
            if (currentIndex < tracks.length - 1) playTrack(currentIndex + 1);
        };
    </script>
</body>
</html>
