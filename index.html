<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎙️ Записать привет — Vladivostok FM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, sans-serif; 
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
      color: white;
    }
    .container { 
      background: #fff; 
      border-radius: 20px; 
      padding: 30px; 
      max-width: 400px; 
      width: 100%; 
      text-align: center; 
      color: #333;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .logo { 
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; 
      margin-bottom: 15px; background: #f0f0f0;
    }
    h1 { font-size: 1.4em; margin-bottom: 5px; color: #1e3c72; }
    .subtitle { color: #666; font-size: 0.95em; margin-bottom: 25px; }
    
    .mic-btn {
      width: 120px; height: 120px; border-radius: 50%; border: none;
      background: #dc3545; color: white; font-size: 2.5em; cursor: pointer;
      margin: 20px auto; display: flex; align-items: center; justify-content: center;
      transition: 0.2s; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording { 
      animation: pulse 1.5s infinite; background: #c82333;
      box-shadow: 0 4px 25px rgba(220, 53, 69, 0.7);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(220, 53, 69, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
    }
    
    .timer { font-size: 2.5em; font-weight: bold; color: #dc3545; margin: 10px 0; font-variant-numeric: tabular-nums; }
    .hint { color: #888; font-size: 0.9em; margin: 15px 0; }
    
    .success-box { 
      display: none; background: #d4edda; color: #155724; 
      padding: 20px; border-radius: 12px; margin-top: 20px;
      border: 1px solid #c3e6cb;
    }
    .success-box.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .error { color: #dc3545; margin: 10px 0; font-size: 0.9em; min-height: 20px; }
    .close-hint { margin-top: 20px; font-size: 0.85em; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <img id="logo" class="logo" src="" alt="" referrerpolicy="no-referrer">
    <h1>Vladivostok FM</h1>
    <div class="subtitle">Запишите голосовое приветствие</div>
    
    <button id="micBtn" class="mic-btn">🎙️</button>
    <div id="timer" class="timer">0:00</div>
    <div id="hint" class="hint">Удерживайте кнопку для записи</div>
    <div id="error" class="error"></div>
    
    <div id="successBox" class="success-box">
      <div style="font-size: 2em; margin-bottom: 10px;">✅</div>
      <div style="font-weight: 600; margin-bottom: 5px;">Привет отправлен!</div>
      <div style="font-size: 0.9em;">Он заиграет в эфире после текущего трека.</div>
      <div class="close-hint">👉 Можете закрыть эту вкладку</div>
    </div>
  </div>

  <script>
    // 🔗 ВСТАВЬТЕ ВАШ WEB APP URL ИЗ GOOGLE APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbx2APIEjWISSmNzj5lVpawa4OeXSWJhOoxI06AZtND-JLkWW81MzJtNqAbghS9j6l1vVQ/exec';

    async function callApi(action, payload = {}) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...payload })
        });
        return await response.json();
      } catch (e) {
        console.error('API Error:', e);
        return { error: 'Connection failed' };
      }
    }

    var mediaRecorder, audioChunks = [], recInterval, recSeconds = 0;
    var micBtn = document.getElementById('micBtn');
    var timerEl = document.getElementById('timer');
    var hintEl = document.getElementById('hint');
    var errorEl = document.getElementById('error');
    var successBox = document.getElementById('successBox');
    var logoEl = document.getElementById('logo');

    // Загрузка логотипа
    callApi('getLogoUrl').then(url => { if(url) logoEl.src = url; });

    async function startRecording() {
      if (!navigator.mediaDevices?.getUserMedia) {
        showError('❌ Браузер не поддерживает запись');
        return;
      }
      
      try {
        audioChunks = []; recSeconds = 0;
        timerEl.textContent = '0:00';
        micBtn.classList.add('recording');
        hintEl.textContent = 'Отпустите, чтобы отправить';
        errorEl.textContent = '';
        
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.start();
        
        recInterval = setInterval(() => {
          recSeconds++;
          var m = Math.floor(recSeconds / 60);
          var s = recSeconds % 60;
          timerEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
          if (recSeconds >= 60) stopRecording();
        }, 1000);
        
      } catch (err) {
        micBtn.classList.remove('recording');
        hintEl.textContent = 'Удерживайте кнопку для записи';
        if (err.name === 'NotAllowedError') {
          showError('❌ Разрешите доступ к микрофону в настройках браузера');
        } else {
          showError('❌ Ошибка: ' + err.message);
        }
      }
    }

    function stopRecording() {
      clearInterval(recInterval);
      micBtn.classList.remove('recording');
      hintEl.textContent = 'Удерживайте кнопку для записи';
      
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.onstop = async () => {
          if (mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(t => t.stop());
          if (recSeconds < 1 || audioChunks.length === 0) {
            showError('⚠️ Слишком короткая запись');
            return;
          }
          
          var blob = new Blob(audioChunks, { type: 'audio/webm' });
          var fileName = 'voice_' + Date.now() + '.webm';
          var reader = new FileReader();
          
          reader.onload = async function(e) {
            hintEl.textContent = '📤 Отправка...';
            var result = await callApi('uploadRequest', {
              base64: e.target.result.split(',')[1],
              fileName: fileName,
              duration: recSeconds
            });
            
            if (result.success) {
              showSuccess();
            } else {
              showError('❌ Ошибка: ' + (result.error || 'Неизвестно'));
            }
          };
          reader.readAsDataURL(blob);
        };
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      setTimeout(() => errorEl.textContent = '', 4000);
    }

    function showSuccess() {
      successBox.classList.add('show');
      micBtn.style.display = 'none';
      timerEl.style.display = 'none';
      hintEl.style.display = 'none';
      errorEl.style.display = 'none';
    }

    micBtn.addEventListener('mousedown', startRecording);
    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
    window.addEventListener('mouseup', () => { if (micBtn.classList.contains('recording')) stopRecording(); });
    window.addEventListener('touchend', () => { if (micBtn.classList.contains('recording')) stopRecording(); });
  </script>
</body>
</html>
